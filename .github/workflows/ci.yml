name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # hipercampo es una app LOCAL: Windows y macOS no son opcionales.
    # La matriz completa solo en la versión estable; los extremos, en Linux.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e . ruff coverage

      - name: Lint (ruff)
        run: python -m ruff check hipercampo/ tests/ scripts/ examples/

      - name: Test suite (todas las suites, incluidas las generativas)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          set -e
          for t in vsa semantic surprise memory update axes hardening namespaces calibration roles safety factstore guardrails muse dream migration facthistory policy resilience estados procs linked api_contract failures backup cli audit properties; do
            echo "::group::test_$t"
            python tests/test_$t.py
            echo "::endgroup::"
          done

      # Cobertura con SUELO: si baja del 78%, el CI falla. No se persigue el 100%
      # (hay ramas que solo se dan en fallos de hardware); se persigue no retroceder.
      - name: Cobertura
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          HIPERCAMPO_LOG: "0"
        run: |
          set -e
          coverage erase
          for t in tests/test_*.py; do coverage run -a --source=hipercampo "$t" >/dev/null; done
          coverage report --sort=cover
          coverage report --fail-under=78

  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e . ruff coverage

      - name: Lint (ruff)
        run: python -m ruff check hipercampo/ tests/ scripts/ examples/
      - name: Benchmark de calidad (modo léxico)
        run: python scripts/benchmark.py
      - name: Banco de estrés (10 hechos + 10 distractores confusos)
        run: python scripts/stress.py
      - name: Comparativa con baselines (BM25 vs hipercampo, léxico)
        run: python scripts/baselines.py
      - name: Ejemplos de uso (smoke)
        run: |
          for e in examples/*.py; do echo "== $e =="; python "$e"; done
