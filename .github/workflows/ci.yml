name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e .

      - name: Test suite (todas las suites, incluidas las generativas)
        run: |
          set -e
          for t in vsa semantic surprise memory update axes hardening namespaces calibration roles safety properties; do
            echo "::group::test_$t"
            python tests/test_$t.py
            echo "::endgroup::"
          done

  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e .
      - name: Benchmark de calidad (modo léxico)
        run: python scripts/benchmark.py
      - name: Banco de estrés (10 hechos + 10 distractores confusos)
        run: python scripts/stress.py
      - name: Comparativa con baselines (BM25 vs hipercampo, léxico)
        run: python scripts/baselines.py
