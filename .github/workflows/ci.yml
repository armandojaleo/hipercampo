name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # hipercampo es una app LOCAL: Windows y macOS no son opcionales.
    # La matriz completa solo en la versión estable; los extremos, en Linux.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e .

      - name: Test suite (todas las suites, incluidas las generativas)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          set -e
          for t in vsa semantic surprise memory update axes hardening namespaces calibration roles safety factstore guardrails muse dream migration facthistory policy resilience estados properties; do
            echo "::group::test_$t"
            python tests/test_$t.py
            echo "::endgroup::"
          done

  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e .
      - name: Benchmark de calidad (modo léxico)
        run: python scripts/benchmark.py
      - name: Banco de estrés (10 hechos + 10 distractores confusos)
        run: python scripts/stress.py
      - name: Comparativa con baselines (BM25 vs hipercampo, léxico)
        run: python scripts/baselines.py
      - name: Ejemplos de uso (smoke)
        run: |
          for e in examples/*.py; do echo "== $e =="; python "$e"; done
