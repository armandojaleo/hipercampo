name: Release to PyPI

# Publica en PyPI al empujar un tag vX.Y.Z. Usa "trusted publishing" (OIDC): sin
# tokens ni secretos. Requiere una configuración ÚNICA en PyPI (ver más abajo).
#
# Pasos de un solo uso (los hace el dueño del paquete):
#   1. Crear el proyecto/nombre "hipercampo" en https://pypi.org
#   2. En "Publishing", añadir un Trusted Publisher de GitHub Actions:
#        owner: armandojaleo   repo: hipercampo   workflow: release.yml
#   3. A partir de ahí, cada tag vX.Y.Z publica solo.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # necesario para trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build
        run: |
          pip install build twine
          python -m build

      # Validar el ARTEFACTO antes de publicar: metadatos, que la version coincida
      # con el tag, que el wheel instale en un entorno limpio, que importe, que el
      # comando arranque y que el servidor MCP responda al handshake.
      - name: twine check
        run: twine check dist/*
      - name: La versión debe coincidir con el tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(ls dist/*.whl | sed -E 's/.*hipercampo-([^-]+)-py3.*/\1/')
          echo "tag=$TAG paquete=$PKG"
          test "$TAG" = "$PKG"
      - name: Instalar el wheel en entorno limpio y comprobarlo
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet dist/*.whl
          /tmp/venv/bin/python -c "import hipercampo; print('version:', hipercampo.__version__)"
          /tmp/venv/bin/python scripts/mcp_smoke.py /tmp/venv/bin/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
